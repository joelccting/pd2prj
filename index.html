<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Campus Navigation System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
      <div id="top-info-bar" class="top-nav-bar" style="display: none;">
        <div id="time-results" class="horizontal-time-grid">
          </div>
      </div>
      <div id="nav-panel" class="modern-panel">
        
        <div class="panel-header">
          <select id="language-selector" class="modern-select minimal">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="route-section">
          <div class="input-group">
            <div class="icon-dot start-dot"></div>
            <select id="start" class="modern-select"></select>
          </div>
          <div class="route-line"></div>
          <div class="input-group">
            <div class="icon-dot end-dot"></div>
            <select id="end" class="modern-select"></select>
          </div>
        </div>

        <div class="options-section">
          <select id="algorithm" class="modern-select minimal">
            <option value="dijkstra">戴克斯特拉演算法</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="accessible">
            <span>Accessible Route</span>
          </label>
        </div>

        <div class="action-section">
          <button id="findRoute" class="btn-primary">開始導航</button>
        </div>

        <div class="admin-section">
          <button id="god-mode" class="btn-warning">🛠️ 開啟上帝模式</button>
        </div>

  </div>
        <!-- 將 index.html 裡的 exportBtn 改成這樣： -->
    <button id="exportBtn" data-i18n="export_btn" style="display: none; position: absolute; top: 20px; right: 20px; z-index: 1000; padding: 15px; font-weight: bold; background-color: #ff3333; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        💾 儲存並下載修改後的路網
    </button>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/graph.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/lang.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
