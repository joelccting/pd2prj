<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Campus Navigation System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <label for="language-selector" data-i18n="language-selector">Select Language:</label>
      <select id="language-selector">
        <option value="zh">繁體中文</option>
        <option value="en">English</option>
      </select>
      <label for="start" data-i18n="start_label">Start Location:</label>
      <select id="start">
        <option value="">Select a start location</option>
      </select>
  
      <label for="end" data-i18n="end_label">End Location:</label>
      <select id="end">
        <option value="">Select an end location</option>
      </select>

      <label for="algorithm" data-i18n="algorithm_label">Algorithm:</label>
      <select id="algorithm">
        <option value="">Choose an algorithm:</option>
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
        <option value="dijkstra">Dijkstra's Algorithm</option>
      </select>
      <label>
        <input type="checkbox" id="accessibility" />
        Accessible Route
      </label>
      <button id="findRoute" data-i18n="find_route_btn">Find Route</button>
    </div>
    <button id="exportBtn" style="position: absolute; top: 20px; right: 20px; z-index: 1000; padding: 15px; font-weight: bold; background-color: #ff3333; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
  💾 儲存並下載修改後的路網
    </button>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/graph.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/app.js"></script>
    <script src="js/lang.js"></script>
  </body>
</html>
