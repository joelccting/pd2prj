<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Campus Navigation System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <label for="start">Start Location:</label>
      <select id="start">
        <option value="">Select a start location</option>
      </select>
  
      <label for="end">End Location:</label>
      <select id="end">
        <option value="">Select an end location</option>
      </select>
      </select>

      <label for="algorithm">Algorithm:</label>
      <select id="algorithm">
        <option value="">Choose an algorithm:</option>
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
        <option value="dijkstra">Dijkstra's Algorithm</option>
      </select>
      <label>
        <input type="checkbox" id="accessibility" />
        Accessible Route
      </label>
      <button id="findRoute">Find Route</button>
    </div>

    <script src="js/graph.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  // 1. 定義校園的左下角 (SouthWest) 和右上角 (NorthEast) 邊界
// (以下座標是大約值，你需要替換成你們學校真實的最南邊與最北邊)
const corner1 = L.latLng(23.550, 120.460); // 左下角 (西南方)
const corner2 = L.latLng(23.570, 120.480); // 右上角 (東北方)

// 2. 將這兩個點組合成一個「邊界物件」
const campusBounds = L.latLngBounds(corner1, corner2);

// 3. 初始化地圖，並把限制條件塞進去
const map = L.map('map', {
  center: [23.560, 120.470], // 地圖一開始的中心點 (學校正中央)
  zoom: 16,                  // 預設縮放大小
  
  // 👇 鎖定地圖範圍的關鍵設定 👇
  maxBounds: campusBounds,   // 限制拖曳範圍在這個框框內
  maxBoundsViscosity: 0.1,   // 邊界的「黏滯性」
  minZoom: 16,               // 限制縮放下限：避免使用者縮太小看到整個縣市
  maxZoom: 22                // 限制縮放上限：避免使用者放太大導致地圖模糊
});
  // Add OpenStreetMap tile layer
  L.tileLayer(
    "https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=YmEOZSxLEE87oOVe10Ps",
    {
      attribution:
        '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',

      maxNativeZoom: 18,
      maxZoom: 22,
      tileSize: 512,
      zoomOffset: -1
    }
  ).addTo(map);
</script>

<script>
// ==========================================
// 🛠️ 開發者專用：點擊地圖獲取精準 Node JSON
// ==========================================
map.on('click', function(e) {
  // 擷取經緯度，保留小數點後 6 位 (精確度大約到 11 公分，非常足夠)
  const lat = e.latlng.lat.toFixed(6);
  const lng = e.latlng.lng.toFixed(6);
  
  // 幫你自動排版成可以立刻貼上 JSON 的格式
  const nodeJSON = `
  { 
    "id": 99999, 
    "name": "請填寫名稱", 
    "lat": ${lat}, 
    "lng": ${lng}, 
    "accessible": true 
  },`;
  
  // 印在 Console 讓你方便複製
  console.log("%c🎯 新節點座標已擷取！", "color: #00ff00; font-size: 14px; font-weight: bold;");
  console.log(nodeJSON);
  
  // 畫面上也會彈出提示
  alert(`已抓取座標！\n緯度: ${lat}\n經度: ${lng}\n(請按 F12 打開 Console 複製完整的 JSON 代碼)`);
});

</script>
