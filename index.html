<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Campus Navigation System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <style>
      #map { height: 100vh; width: 100%; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="top-info-bar" class="top-nav-bar" style="display: none;">
      <div id="time-results" class="horizontal-time-grid"></div>
    </div>
    
    <div id="nav-panel" class="modern-panel">
      <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
        <select id="language-selector" class="modern-select minimal" style="flex: 1;">
          <option value="zh">繁體中文</option>
          <option value="en">English</option>
        </select>
        <button id="toggle-panel" aria-expanded="true" aria-label="收合左上角面板" style="margin-left: 8px; padding: 6px 10px; background-color: #4A90E2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;">
          ⬅️
        </button>
      </div>

      <div class="options-section" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div class="option-group">
          <h4 data-i18n="nav_mode_title" style="margin: 0 0 8px 0; color: #333; font-size: 14px; white-space: nowrap;">巡航策略</h4>
          <select id="cruise-mode" class="modern-select" style="width: 100%; box-sizing: border-box;">
            <option value="single" data-i18n="mode_single">單一目的地 (最短路徑)</option>
            <option value="ordered" data-i18n="mode_ordered">多目的地 (依順序巡航)</option>
            <option value="optimized" data-i18n="mode_optimized">多目的地 (自動優化順序-TSP)</option>
          </select>
        </div>

        <div class="option-group">
          <h4 data-i18n="route_pref_title" style="margin: 0 0 8px 0; color: #333; font-size: 14px; white-space: nowrap;">路線偏好</h4>
            <select id="route-weight" class="modern-select" style="width: 100%; box-sizing: border-box;">
              <option value="shortest" data-i18n="mode_distance">🚶 距離最短 (預設)</option>
              <option value="least_turns" data-i18n="mode_lazy">最少轉彎</option>
              <option value="least_climbing" data-i18n="mode_elegant">最平坦路線</option>
              <option value="shade" data-i18n="mode_shade">🌳 避暑/林蔭模式</option>
            </select>
        </div>

      </div>

      <div class="route-section">
        <div class="input-group">
          <div class="icon-dot start-dot"></div>
          <div class="location-picker">
            <input type="text" id="start-search" class="modern-select" data-i18n-placeholder="search_start" placeholder="🔍 搜尋起點..." style="flex: 1;">
            <select id="start" class="modern-select" style="flex: 1; display: none;"></select>
          </div>
        </div>
        
        <div class="route-line"></div>

        <div id="waypoint-container">
          <div class="input-group waypoint-item">
            <div class="icon-dot end-dot"></div>
            <div class="location-picker">
              <input type="text" id="waypoint-0-search" class="waypoint-search modern-select" data-i18n-placeholder="search_destination" placeholder="🔍 搜尋目的地..." style="flex: 1;">
              <select id="waypoint-0" class="modern-select waypoint-select" style="flex: 1; display: none;"></select>
            </div>
            <button class="btn-remove-waypoint" style="display:none;">×</button>
          </div>
        </div>

        <button id="add-waypoint" class="btn-secondary" data-i18n="add_waypoint" style="width: 100%; margin-top: 10px;">
          + 增加目的地
        </button>
      </div>
        <div class="option-group">
          <h4 data-i18n="transport_mode_title" style="margin: 0 0 8px 0; color: #333; font-size: 14px; white-space: nowrap;">交通工具</h4>
          <select id="transport-mode" class="modern-select" style="width: 100%; box-sizing: border-box;">
            <option value="walk" selected data-i18n="time_walk">🚶 步行</option>
            <option value="bike" data-i18n="time_bike">🚲 腳踏車</option>
            <option value="ebike" data-i18n="time_ebike">⚡ 電動車</option>
            <option value="motorcycle" data-i18n="time_motorcycle">🛵 機車</option>
            <option value="car" data-i18n="time_car">🚗 汽車</option>
          </select>
        </div>
      <div class="action-section">
        <button id="findRoute" class="btn-primary" data-i18n="start_cruise">開始巡航導航</button>
        <button id="markerback" class="btn-warning" data-i18n="markerback" style="width: 100%; margin-top: 8px;">🔄 恢復地標</button>
        <div class="layer-toggles" style="margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e0e0e0;">

        <h4 data-i18n="shadow_layer_title" style="margin: 0 0 10px 0; font-size: 14px; color: #333; display: flex; align-items: center; gap: 6px;">🕶️ 地圖遮陽圖層</h4>
        

        <label style="display: flex; align-items: center; margin-bottom: 0px; cursor: pointer; font-size: 13px; user-select: none;">
          <input type="checkbox" id="toggle-realtime-shadow" style="margin-right: 8px; width: 16px; height: 16px; cursor: pointer;">
          <span data-i18n="show_shadow" style="color: #2E7D32; font-weight: 600;">顯示即時陰影</span>
        </label>
      </div>

      <div class="stats-section">
          <button id="toggle-stats" class="stats-header-btn">
            <span data-i18n="stats_title">📊 路線與圖資數據分析</span>
            <span id="stats-arrow">▼</span>
          </button>
          <div id="stats-content" class="stats-content" style="display: none;">
            <div class="stat-row">
              <span data-i18n="stat_graph_size">📍 圖資規模:</span>
              <span id="stat-graph-size" class="stat-value" data-i18n="stat_loading">載入中...</span>
            </div>
            <div class="stat-row">
              <span data-i18n="stat_route_length">📏 路線總長:</span>
              <span id="stat-route-dist" class="stat-value" data-i18n="stat_meters_placeholder">-- 公尺</span>
            </div>
            <div class="stat-row">
              <span data-i18n="stat_shade_coverage">🌳 遮蔭覆蓋率:</span>
              <span id="stat-shade-rate" class="stat-value">-- %</span>
            </div>
          </div>
        </div>
      </div>
      
    </div>

    <button id="god-mode" data-i18n="god_mode_enable_btn" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000; padding: 12px 20px; font-weight: bold; background-color: #f0ad4e; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        🛠️ 開啟上帝模式
    </button>
    <button id="exportBtn" data-i18n="export_btn" style="display: none; position: fixed; bottom: 70px; right: 20px; z-index: 2000; padding: 12px 20px; font-weight: bold; background-color: #ff3333; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        💾 儲存並下載修改後的路網
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

    <script src="js/graph.js"></script>
    <script src="js/lang.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
